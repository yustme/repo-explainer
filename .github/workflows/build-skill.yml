name: build-skill

# Build and validate the standalone Agnes skill bundle on every push/PR,
# and attach it to GitHub Releases when a tag is pushed.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build + validate + package
        run: python3 scripts/build_skill.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-explainer-skill
          path: dist/repo-explainer.skill
          if-no-files-found: error

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/repo-explainer.skill
